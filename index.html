function analyzeCourseTitle(titulo) {
  const t = (titulo || '').toLowerCase();
  if (!t.trim()) return null;
  for (const cat of CATEGORIAS_IA) {
    for (const kw of cat.keywords) {
      if (t.includes(kw)) return cat;
    }
  }
  return { categoria: 'General', rubro: 'general', paleta: ['#3b82f6', '#06b6d4', '#fff'], iconos: '⭐', estilo: 'Profesional moderno azul' };
}

const Storage = {
  get(key, fallback) {
    try { const v = localStorage.getItem('orbita_' + key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set(key, val) {
    try { localStorage.setItem('orbita_' + key, JSON.stringify(val)); } catch (e) { console.warn(e); }
  }
};

const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

function AppProvider({ children }) {
  const [consultoras, setConsultoras] = useState(() => Storage.get('consultoras', CONSULTORAS_DEFAULT));
  const [cursos, setCursos] = useState(() => Storage.get('cursos', []));
  const [historial, setHistorial] = useState(() => Storage.get('historial', []));
  const [plantillas, setPlantillas] = useState(() => Storage.get('plantillas', []));
  const [route, setRoute] = useState({ name: 'dashboard' });

  useEffect(() => Storage.set('consultoras', consultoras), [consultoras]);
  useEffect(() => Storage.set('cursos', cursos), [cursos]);
  useEffect(() => Storage.set('historial', historial), [historial]);
  useEffect(() => Storage.set('plantillas', plantillas), [plantillas]);

  const value = {
    consultoras, setConsultoras,
    cursos, setCursos,
    historial, setHistorial,
    plantillas, setPlantillas,
    route, setRoute,
    navigate: (name, params = {}) => setRoute({ name, ...params }),
  };

  return <AppCtx.Provider value={value}>{children}</AppCtx.Provider>;
}

function getInitials(nombre) {
  return (nombre || '?').split(' ').filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();

    return <img src={consultora.avatar} alt={consultora.nombre} className={sizes[size] + ' rounded-full object-cover border-2 border-white/20'} />;
  }
  return (
    <div
      className={sizes[size] + ' rounded-full flex items-center justify-center font-bold text-white border-2 border-white/15 shadow-lg'}

  const referenciaActiva = form.referenciaCurso || consultora.referencia || '';

  const generarFlyer = () => {

    const cursoData = { ...form, id: 'c_' + Date.now(), consultoraId: consultora.id, creado: Date.now(), analisis };
    setCursos([...cursos, cursoData]);

  return (
    <div className="flex-1 overflow-auto scrollbar-thin">
      <Topbar
        titulo={consultora.nombre}
        subtitulo={consultora.rubro}
        right={
          <button onClick={() => navigate('dashboard')} className="px-4 py-2 rounded-xl glass text-sm hover:bg-white/10">← Dashboard</button>

              <div className="col-span-2">
                <label className="block text-xs uppercase tracking-wider text-blue-300/70 mb-1.5 font-semibold">Nombre del curso *</label>
                <input value={form.nombre} onChange={e => update('nombre', e.target.value)} placeholder="Ej. Cómo aplicar rellenos faciales con ácido hialurónico" className="w-full px-4 py-3 rounded-xl text-sm" />

              <Field label="Fecha de inicio" value={form.fechaInicio} onChange={v => update('fechaInicio', v)} type="date" />
              <Field label="Duración" value={form.duracion} onChange={v => update('duracion', v)} placeholder="Ej. 4 sesiones / 12 horas" />
              <Field label="Precio" value={form.precio} onChange={v => update('precio', v)} placeholder="Ej. $1,500 MXN" />

}

let layerCounter = 0;
function nextLayerId() { return 'L' + (++layerCounter); }

function construirFlyerBase(canvas, curso, consultora) {
  const W = 1080, H = 1080;
  const c1 = consultora.colorPrincipal;
  const c2 = consultora.colorSecundario;
  const ana = curso.analisis;

  const bg = new fabric.Rect({
    left: 0, top: 0, width: W, height: H,
    fill: new fabric.Gradient({
      type: 'linear', coords: { x1: 0, y1: 0, x2: W, y2: H },
      colorStops: [{ offset: 0, color: c1 }, { offset: 1, color: c2 }]
    }),
    selectable: false, evented: false
  });
  bg.layerId = nextLayerId(); bg.layerName = 'background';
  canvas.add(bg);

  const overlay = new fabric.Rect({
    left: 0, top: H * 0.55, width: W, height: H * 0.45,
    fill: new fabric.Gradient({
      type: 'linear', coords: { x1: 0, y1: 0, x2: 0, y2: H * 0.45 },
      colorStops: [{ offset: 0, color: 'rgba(0,0,0,0)' }, { offset: 1, color: 'rgba(0,0,0,0.75)' }]
    }),
    selectable: false, evented: false
  });
  overlay.layerId = nextLayerId(); overlay.layerName = 'overlay';
  canvas.add(overlay);

  const deco = new fabric.Circle({
    left: W - 200, top: -150, radius: 280,
    fill: 'rgba(255,255,255,0.08)', stroke: 'rgba(255,255,255,0.2)', strokeWidth: 2
  });
  deco.layerId = nextLayerId(); deco.layerName = 'decorativeShape';
  canvas.add(deco);

  const badgeBg = new fabric.Rect({
    left: 60, top: 60, width: 240, height: 50, rx: 25, ry: 25,
    fill: 'rgba(255,255,255,0.95)'
  });
  badgeBg.layerId = nextLayerId(); badgeBg.layerName = 'badgeBg';
  canvas.add(badgeBg);

  const badgeText = new fabric.IText((curso.tipoPublicacion || 'CURSO').toUpperCase(), {
    left: 180, top: 85, fontSize: 16, fontWeight: 'bold', fill: c1,
    fontFamily: 'Inter, sans-serif', originX: 'center', originY: 'center', textAlign: 'center', charSpacing: 100
  });
  badgeText.layerId = nextLayerId(); badgeText.layerName = 'badgeText';
  canvas.add(badgeText);

  const consText = new fabric.IText(consultora.nombre.toUpperCase(), {
    left: W - 60, top: 85, fontSize: 22, fontWeight: 'bold', fill: '#ffffff',
    fontFamily: 'Inter, sans-serif', originX: 'right', originY: 'center', opacity: 0.9
  });
  consText.layerId = nextLayerId(); consText.layerName = 'consultoraText';
  canvas.add(consText);

  if (ana) {
    const sub = new fabric.IText(ana.categoria.toUpperCase(), {
      left: 60, top: 340, fontSize: 22, fontWeight: 'bold', fill: c2,
      fontFamily: 'Inter, sans-serif', charSpacing: 200
    });
    sub.layerId = nextLayerId(); sub.layerName = 'subtitleText';
    canvas.add(sub);
  }

  const titulo = new fabric.IText(curso.nombre.toUpperCase(), {
    left: 60, top: 380, fontSize: 68, fontWeight: '900', fill: '#ffffff',
    fontFamily: 'Inter, sans-serif', width: 960, lineHeight: 1.05,
    shadow: 'rgba(0,0,0,0.4) 0 4 20'
  });
  titulo.layerId = nextLayerId(); titulo.layerName = 'titleText';
  canvas.add(titulo);

  let chipY = 720;
  const chipsArr = [
    curso.fechaInicio && '📅 ' + curso.fechaInicio,
    curso.modalidad && '💻 ' + curso.modalidad,
    curso.duracion && '⏱ ' + curso.duracion,
  ].filter(Boolean);

  let chipX = 60;
  chipsArr.forEach((label, i) => {
    const t = new fabric.IText(label, {
      left: chipX, top: chipY, fontSize: 22, fill: '#ffffff', fontFamily: 'Inter, sans-serif',
      backgroundColor: 'rgba(255,255,255,0.15)', padding: 12
    });
    t.layerId = nextLayerId(); t.layerName = 'chip_' + i;
    canvas.add(t);
    chipX += t.width + 30;
  });

  if (curso.precio) {
    const precio = new fabric.IText(curso.precio, {
      left: W - 60, top: 800, fontSize: 60, fontWeight: '900', fill: c2,
      fontFamily: 'Inter, sans-serif', originX: 'right',
      shadow: 'rgba(0,0,0,0.5) 0 4 12'
    });
    precio.layerId = nextLayerId(); precio.layerName = 'priceText';
    canvas.add(precio);
  }

  const ctaBg = new fabric.Rect({
    left: 60, top: 900, width: 380, height: 80, rx: 40, ry: 40,
    fill: '#ffffff'
  });
  ctaBg.layerId = nextLayerId(); ctaBg.layerName = 'ctaBg';
  canvas.add(ctaBg);

  const ctaText = new fabric.IText(curso.cta || 'INSCRÍBETE HOY', {
    left: 250, top: 940, fontSize: 26, fontWeight: '900', fill: c1,
    fontFamily: 'Inter, sans-serif', originX: 'center', originY: 'center', charSpacing: 100
  });
  ctaText.layerId = nextLayerId(); ctaText.layerName = 'ctaText';
  canvas.add(ctaText);

  const footerStr = [curso.telefono, curso.web].filter(Boolean).join('   ·   ');
  if (footerStr) {
    const footer = new fabric.IText(footerStr, {
      left: W - 60, top: 940, fontSize: 20, fill: '#ffffff',
      fontFamily: 'Inter, sans-serif', originX: 'right', originY: 'center', opacity: 0.85
    });
    footer.layerId = nextLayerId(); footer.layerName = 'footerContact';
    canvas.add(footer);
  }

  if (curso.ponente) {
    const pon = new fabric.IText('PONENTE: ' + curso.ponente, {
      left: 60, top: 820, fontSize: 18, fontWeight: 'bold', fill: '#ffffff',
      fontFamily: 'Inter, sans-serif', opacity: 0.85, charSpacing: 100
    });
    pon.layerId = nextLayerId(); pon.layerName = 'ponenteText';
    canvas.add(pon);
  }

  canvas.requestRenderAll();
}

function addText(canvas) {
  if (!canvas) return;
  const t = new fabric.IText('Nuevo texto', {
    left: 540, top: 540, fontSize: 48, fill: '#ffffff', fontFamily: 'Inter, sans-serif',
    originX: 'center', originY: 'center'
  });
  t.layerId = nextLayerId(); t.layerName = 'newText';
  canvas.add(t);
  canvas.setActiveObject(t);
  canvas.requestRenderAll();
}

function addImage(e, canvas, refresh) {
  const file = e.target.files[0]; if (!file || !canvas) return;
  const reader = new FileReader();
  reader.onload = ev => {
    fabric.Image.fromURL(ev.target.result, img => {
      img.scaleToWidth(400);
      img.set({ left: 540, top: 540, originX: 'center', originY: 'center' });
      img.layerId = nextLayerId(); img.layerName = 'newImage';
      canvas.add(img);
      canvas.setActiveObject(img);
      canvas.requestRenderAll();
      refresh && refresh();
    });
  };
  reader.readAsDataURL(file);
}

function FlyerEditor() {
  const { route, navigate, consultoras, cursos, historial, setHistorial } = useApp();
  const consultora = consultoras.find(c => c.id === route.consultoraId);
  const curso = cursos.find(c => c.id === route.cursoId);
  const canvasRef = useRef(null);
  const fabricRef = useRef(null);
  const [layers, setLayers] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [props, setProps] = useState({});

  useEffect(() => {
    if (!canvasRef.current || !curso || !consultora) return;
    const canvas = new fabric.Canvas(canvasRef.current, { width: 1080, height: 1080, backgroundColor: '#0a1538' });
    fabricRef.current = canvas;

    construirFlyerBase(canvas, curso, consultora);
    refreshLayers();

    canvas.on('selection:created', e => onSelect(e.selected[0]));
    canvas.on('selection:updated', e => onSelect(e.selected[0]));
    canvas.on('selection:cleared', () => { setSelectedId(null); setProps({}); });
    canvas.on('object:modified', refreshLayers);

    return () => canvas.dispose();
  }, []);

  function refreshLayers() {
    if (!fabricRef.current) return;
    const objs = fabricRef.current.getObjects();
    setLayers(objs.map(o => ({ id: o.layerId, name: o.layerName, type: o.type, obj: o })));
  }

  function onSelect(obj) {
    setSelectedId(obj.layerId);
    setProps({
      text: obj.text !== undefined ? obj.text : '',
      fontSize: obj.fontSize || 0,
      fill: typeof obj.fill === 'string' ? obj.fill : '#ffffff',
      fontWeight: obj.fontWeight || 'normal',
      opacity: obj.opacity !== undefined ? obj.opacity : 1,
    });
  }

  function updateSelected(key, val) {
    const obj = fabricRef.current.getActiveObject(); if (!obj) return;
    obj.set(key, val);
    fabricRef.current.requestRenderAll();
    setProps(p => ({ ...p, [key]: val }));
  }

  function selectLayer(layer) {
    fabricRef.current.setActiveObject(layer.obj);
    fabricRef.current.requestRenderAll();
    onSelect(layer.obj);
  }

  function deleteLayer(layer) {
    fabricRef.current.remove(layer.obj);
    fabricRef.current.requestRenderAll();
    refreshLayers();
  }

  function moveLayer(layer, dir) {
    if (dir === 'up') layer.obj.bringForward(); else layer.obj.sendBackwards();
    fabricRef.current.requestRenderAll();
    refreshLayers();
  }

  function exportPNG(size) {
    const canvas = fabricRef.current;
    const multiplier = size / 1080;
    const dataURL = canvas.toDataURL({ format: 'png', multiplier });
    const link = document.createElement('a');
    link.download = (curso.nombre || 'flyer').toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') + '-' + size + '.png';
    link.href = dataURL;
    link.click();
    setHistorial([...historial, {
      id: 'h_' + Date.now(),
      curso: curso.nombre,
      consultora: consultora.nombre,
      size,
      fecha: Date.now(),
      preview: canvas.toDataURL({ format: 'png', multiplier: 0.25 })
    }]);
  }

  if (!curso || !consultora) {
    return <div className="p-8 text-blue-200">Curso no encontrado. <button onClick={() => navigate('dashboard')} className="text-cyan-300 underline">Volver</button></div>;
  }

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <Topbar
        titulo="Editor de Flyer"
        subtitulo={consultora.nombre + ' · ' + curso.nombre}
        right={
          <div className="flex gap-2">
            <button onClick={() => navigate('workspace', { consultoraId: consultora.id })} className="px-4 py-2 rounded-xl glass text-sm hover:bg-white/10">← Volver</button>
            <button onClick={() => exportPNG(1080)} className="px-4 py-2 rounded-xl glass text-sm hover:bg-white/10 border border-cyan-400/30">PNG 1080</button>
            <button onClick={() => exportPNG(2048)} className="btn-primary px-4 py-2 rounded-xl text-sm font-semibold text-white">⬇ PNG 2048</button>
          </div>
        }
      />

      <div className="flex-1 grid grid-cols-12 gap-4 p-4 overflow-hidden">
        <div className="col-span-3 glass rounded-2xl p-4 flex flex-col overflow-hidden">
          <div className="text-sm font-bold mb-3 flex items-center gap-2">
            <span className="w-1 h-4 rounded-full bg-cyan-400"></span>
            Capas
          </div>
          <div className="flex-1 overflow-auto scrollbar-thin space-y-1.5">
            {[...layers].reverse().map(l => (
              <div
                key={l.id}
                className={'layer-row flex items-center gap-2 p-2.5 rounded-lg border border-white/10 cursor-pointer hover:bg-white/5 ' + (selectedId === l.id ? 'selected' : '')}
                onClick={() => selectLayer(l)}
              >
                <span className="text-xs text-blue-300/70">{l.type === 'i-text' ? '✎' : l.type === 'image' ? '◰' : '◇'}</span>
                <span className="text-xs flex-1 truncate">{l.name}</span>
                <button onClick={e => { e.stopPropagation(); moveLayer(l, 'up'); }} className="text-xs text-blue-200/60 hover:text-white px-1">↑</button>
                <button onClick={e => { e.stopPropagation(); moveLayer(l, 'down'); }} className="text-xs text-blue-200/60 hover:text-white px-1">↓</button>
                <button onClick={e => { e.stopPropagation(); deleteLayer(l); }} className="text-xs text-red-300/70 hover:text-red-300 px-1">×</button>
              </div>
            ))}
          </div>
          <div className="pt-3 mt-3 border-t border-white/10 space-y-2">
            <button onClick={() => { addText(fabricRef.current); refreshLayers(); }} className="w-full px-3 py-2 rounded-lg glass text-xs hover:bg-white/10">+ Añadir texto</button>
            <label className="block w-full px-3 py-2 rounded-lg glass text-xs hover:bg-white/10 cursor-pointer text-center">
              + Añadir imagen
              <input type="file" accept="image/*" className="hidden" onChange={e => addImage(e, fabricRef.current, refreshLayers)} />
            </label>
          </div>
        </div>

        <div className="col-span-6 glass rounded-2xl p-4 flex flex-col items-center justify-center overflow-hidden">
          <div className="text-xs text-blue-200/60 mb-2 font-mono">1080 × 1080 · Vista escalada al 50%</div>
          <div className="flex-1 flex items-center justify-center w-full overflow-hidden">
            <div style={{ transform: 'scale(0.5)', transformOrigin: 'center center' }}>
              <canvas ref={canvasRef} className="rounded-xl" style={{ boxShadow: '0 0 60px rgba(60,130,255,0.3)' }}></canvas>
            </div>
          </div>
        </div>

        <div className="col-span-3 glass rounded-2xl p-4 overflow-auto scrollbar-thin">
          <div className="text-sm font-bold mb-3 flex items-center gap-2">
            <span className="w-1 h-4 rounded-full bg-violet-400"></span>
            Propiedades
          </div>
          {selectedId ? (
            <div className="space-y-3">
              {props.text !== undefined && props.text !== '' && (
                <div>
                  <label className="text-xs uppercase tracking-wider text-blue-300/70 font-semibold">Texto</label>
                  <textarea value={props.text} onChange={e => updateSelected('text', e.target.value)} rows="3" className="w-full mt-1 px-3 py-2 rounded-lg text-sm resize-none" />
                </div>
              )}
              {props.fontSize > 0 && (
                <div>
                  <label className="text-xs uppercase tracking-wider text-blue-300/70 font-semibold">Tamaño · {props.fontSize}px</label>
                  <input type="range" min="10" max="160" value={props.fontSize} onChange={e => updateSelected('fontSize', parseInt(e.target.value))} className="w-full mt-1" />
                </div>
              )}
              <div>
                <label className="text-xs uppercase tracking-wider text-blue-300/70 font-semibold">Color</label>
                <input type="color" value={props.fill} onChange={e => updateSelected('fill', e.target.value)} className="w-full mt-1 h-10 rounded-lg cursor-pointer" />
              </div>
              {props.fontSize > 0 && (
                <div>
                  <label className="text-xs uppercase tracking-wider text-blue-300/70 font-semibold">Peso</label>
                  <select value={props.fontWeight} onChange={e => updateSelected('fontWeight', e.target.value)} className="w-full mt-1 px-3 py-2 rounded-lg text-sm">
                    <option value="normal">Normal</option>
                    <option value="bold">Bold</option>
                    <option value="900">Black</option>
                  </select>
                </div>
              )}
              <div>
                <label className="text-xs uppercase tracking-wider text-blue-300/70 font-semibold">Opacidad · {Math.round(props.opacity * 100)}%</label>
                <input type="range" min="0" max="1" step="0.05" value={props.opacity} onChange={e => updateSelected('opacity', parseFloat(e.target.value))} className="w-full mt-1" />
              </div>
            </div>
          ) : (
            <div className="text-xs text-blue-200/50 leading-relaxed">Selecciona una capa del canvas o de la lista para editar sus propiedades.</div>
          )}

          <div className="mt-6 pt-5 border-t border-white/10">
            <div className="text-xs uppercase tracking-wider text-blue-300/70 font-semibold mb-2">Acciones IA</div>
            <div className="space-y-2">
              {['Versión más premium', 'Versión minimalista', 'Versión más visual', 'Versión comercial'].map(a => (
                <button key={a} onClick={() => alert('IA en modo demo. Conecta OpenAI para activar: ' + a)} className="w-full px-3 py-2 rounded-lg glass text-xs hover:bg-white/10 text-left">↻ {a}</button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Plantillas() {
  return (
    <div className="flex-1 overflow-auto scrollbar-thin">
      <Topbar titulo="Plantillas" subtitulo="Guarda diseños como plantillas reutilizables" />
      <div className="p-8">
        <div className="glass rounded-2xl p-12 text-center">
          <div className="text-5xl mb-4 opacity-50">◫</div>
          <p className="text-blue-200/70">Aún no hay plantillas guardadas. En la siguiente fase podrás guardar diseños del editor como plantillas reutilizables.</p>
        </div>
      </div>
    </div>
  );
}

function Historial() {
  const { historial, navigate } = useApp();
  return (
    <div className="flex-1 overflow-auto scrollbar-thin">
      <Topbar titulo="Historial de diseños" subtitulo={historial.length + ' diseños generados'} />
      <div className="p-8">
        {historial.length === 0 ? (
          <div className="glass rounded-2xl p-12 text-center">
            <div className="text-5xl mb-4 opacity-50">⟲</div>
            <p className="text-blue-200/70">Tu historial está vacío. Empieza generando un flyer.</p>
            <button onClick={() => navigate('dashboard')} className="mt-4 btn-primary px-5 py-2.5 rounded-xl text-sm font-semibold text-white">Ir al Dashboard</button>
          </div>
        ) : (
          <div className="grid grid-cols-4 gap-4">
            {historial.slice().reverse().map(h => (
              <div key={h.id} className="glass rounded-2xl overflow-hidden card-hover">
                {h.preview && <img src={h.preview} alt="" className="w-full aspect-square object-cover" />}
                <div className="p-3">
                  <div className="text-sm font-semibold truncate">{h.curso}</div>
                  <div className="text-xs text-blue-200/60">{h.consultora}</div>
                  <div className="text-[10px] text-blue-200/50 mt-1">{new Date(h.fecha).toLocaleString('es-MX')} · {h.size}px</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function AdminConsultoras() {
  const { consultoras, setConsultoras } = useApp();

  const toggle = id => setConsultoras(consultoras.map(c => c.id === id ? { ...c, activa: !c.activa } : c));
  const updateField = (id, key, val) => setConsultoras(consultoras.map(c => c.id === id ? { ...c, [key]: val } : c));

  const uploadAvatar = (id, e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => updateField(id, 'avatar', ev.target.result);
    reader.readAsDataURL(file);
  };

  return (
    <div className="flex-1 overflow-auto scrollbar-thin">
      <Topbar titulo="Administrar Consultoras" subtitulo="Edita avatares, colores y estado activo" />
      <div className="p-8 space-y-3">
        {consultoras.map(c => (
          <div key={c.id} className="glass rounded-2xl p-5 flex items-center gap-5">
            <Avatar consultora={c} size="lg" />
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-3">
                <input value={c.nombre} onChange={e => updateField(c.id, 'nombre', e.target.value)} className="text-base font-bold bg-transparent border-0 outline-none flex-1 max-w-xs" style={{ background: 'transparent !important', border: '0 !important' }} />
                <span className={'text-[10px] px-2 py-0.5 rounded-full font-bold ' + (c.activa ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-400/30' : 'bg-gray-500/20 text-gray-400 border border-gray-400/30')}>
                  {c.activa ? 'ACTIVA' : 'INACTIVA'}
                </span>
              </div>
              <input value={c.rubro} onChange={e => updateField(c.id, 'rubro', e.target.value)} className="text-xs text-blue-200/70 bg-transparent border-0 outline-none w-full mt-1" />
            </div>
            <div className="flex gap-2">
              <input type="color" value={c.colorPrincipal} onChange={e => updateField(c.id, 'colorPrincipal', e.target.value)} className="w-10 h-10 rounded-lg cursor-pointer" />
              <input type="color" value={c.colorSecundario} onChange={e => updateField(c.id, 'colorSecundario', e.target.value)} className="w-10 h-10 rounded-lg cursor-pointer" />
            </div>
            <label className="px-3 py-2 rounded-lg glass text-xs cursor-pointer hover:bg-white/10">
              📷 Avatar
              <input type="file" accept="image/*" className="hidden" onChange={e => uploadAvatar(c.id, e)} />
            </label>
            <button
              onClick={() => toggle(c.id)}
              className={'px-4 py-2 rounded-lg text-xs font-semibold ' + (c.activa ? 'glass hover:bg-white/10' : 'btn-primary text-white')}
            >
              {c.activa ? 'Desactivar' : 'Activar'}
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

function CierreCurso() {
  return (
    <div className="flex-1 overflow-auto scrollbar-thin">
      <Topbar titulo="Publicación de cierre" subtitulo="Sube la captura grupal y genera el agradecimiento" />
      <div className="p-8">
        <div className="glass rounded-2xl p-12 text-center max-w-2xl mx-auto">
          <div className="text-5xl mb-4 opacity-60">◎</div>
          <h3 className="text-xl font-bold mb-2 gradient-text">Próxima fase</h3>
          <p className="text-blue-200/70 leading-relaxed">El módulo de cierre permitirá subir la foto grupal del curso y generar un diseño con mensaje de agradecimiento, fondo temático según el rubro de la consultora y exportación en PNG. La estructura del MVP ya está lista para implementarlo.</p>
        </div>
      </div>
    </div>
  );
}

function Router() {
  const { route } = useApp();
  return (
    <div className="flex h-screen w-screen overflow-hidden">
      <Sidebar />
      {route.name === 'dashboard' && <Dashboard />}
      {route.name === 'workspace' && <ConsultoraWorkspace />}
      {route.name === 'editor' && <FlyerEditor />}
      {route.name === 'plantillas' && <Plantillas />}
      {route.name === 'historial' && <Historial />}
      {route.name === 'admin' && <AdminConsultoras />}
      {route.name === 'cierre' && <CierreCurso />}
    </div>
  );
}

function App() {
  return (
    <AppProvider>
      <Router />
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
