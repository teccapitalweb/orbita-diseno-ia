function analyzeCourseTitle(titulo) {
  const t = (titulo || '').toLowerCase();
  if (!t.trim()) return null;
  for (const cat of CATEGORIAS_IA) {
    for (const kw of cat.keywords) {
      if (t.includes(kw)) return cat;

  }
  return { categoria: 'General', rubro: 'general', paleta: ['#3b82f6', '#06b6d4', '#fff'], iconos: '⭐', estilo: 'Profesional moderno azul' };

function detectarSector(nombre, descripcion) {
  const t = ((nombre || '') + ' ' + (descripcion || '')).toLowerCase();
  const map = [
    { sector: 'dental', kw: ['dent', 'odont', 'endodonc', 'ortodonc', 'periodonc', 'implante dental', 'caries'] },
    { sector: 'estetica', kw: ['relleno', 'hialurónico', 'botox', 'estética', 'armoniz', 'facial', 'piel', 'dermat', 'antienvejec'] },
    { sector: 'juridico', kw: ['amparo', 'derecho', 'jurídic', 'legal', 'abogad', 'tribunal', 'juicio', 'demand', 'contrato', 'fiscal', 'penal'] },
    { sector: 'agro', kw: ['inocuidad', 'agroaliment', 'cultivo', 'siembra', 'cosecha', 'agric', 'campo', 'fertiliz', 'pesticid', 'orgánico', 'sustent'] },
    { sector: 'veterinario', kw: ['vetera', 'mascot', 'canino', 'felino'] },
    { sector: 'pecuario', kw: ['ganad', 'bovino', 'porcin', 'equin', 'lechero', 'engorda', 'rancho', 'pecuar'] },
    { sector: 'avicola', kw: ['avic', 'pollo', 'ave de corral', 'huevo'] },
    { sector: 'comercio', kw: ['exportar', 'importar', 'comercio exterior', 'logística', 'aduana', 'transport', 'cadena de suministro'] },
    { sector: 'negocios', kw: ['emprend', 'negocio', 'venta', 'marketing', 'finanza', 'liderazg', 'pyme', 'gerenc', 'directiv'] },
    { sector: 'tecnologia', kw: ['program', 'desarrollo web', 'software', 'app', 'inteligencia artificial', 'data', 'cloud', 'devops'] },
    { sector: 'biotech', kw: ['biotec', 'biolog', 'genétic', 'molecular', 'celular', 'inmunol'] },
    { sector: 'ingenieria', kw: ['ingenier', 'industrial', 'sketchup', 'autocad', 'arquitec', 'construcc', 'mantenimiento'] }
  ];
  for (const item of map) for (const kw of item.kw) if (t.includes(kw)) return item.sector;
  return 'general';
}

      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: opts.model || 'gpt-4o',
        messages,
        temperature: opts.temperature ?? 0.85,
        response_format: opts.json ? { type: 'json_object' } : undefined,
        max_tokens: opts.max_tokens || 2000
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error('GPT error: ' + (err.error?.message || res.statusText));
    }
    const data = await res.json();
    return data.choices[0].message.content;
  },

  // AGENTE 1+2+3 unificado: Director de Arte Sectorial
  async composeFlyer(curso, consultora) {
    const sector = detectarSector(curso.nombre, curso.descripcionBreve);
    const biblio = BIBLIOTECAS_SECTORIALES[sector];

    const systemPrompt = `Eres el director de arte senior de un estudio creativo premium, especializado en flyers para cursos profesionales del sector ${biblio.nombre}.

CONTEXTO SECTORIAL OBLIGATORIO:
- Referencias visuales del sector: ${biblio.referencias}
- Paleta del sector: ${biblio.paleta}
- Estilo de fotografía: ${biblio.fotografia}
- Tipografía: ${biblio.tipografia}
- Estilo general: ${biblio.estilo}

REGLAS DE EXCELENCIA:
1. El flyer debe verse como diseñado por un estudio profesional, NO como un template genérico
2. La imagen debe planificar copy-space (zona vacía/desenfocada) donde irá el texto principal
3. Los sellos deben tener jerarquía clara y NO obstruir elementos importantes de la imagen
4. La paleta debe respetar la marca de la consultora pero ser refinada (5 colores con porcentajes)
5. Los bullets deben ser micro-copy editorial impactante, no descripciones largas
6. Debes aprovechar las referencias del sector específico para que el flyer "se vea" del rubro correcto

Devuelve SOLO un JSON con esta estructura exacta (sin markdown):
{
  "sectorDetectado": "${biblio.nombre}",
  "concepto": "1-2 frases describiendo el concepto creativo del flyer",
  "imagePrompt": "Prompt MUY detallado en INGLÉS para DALL-E 3 HD que incluya: estilo de fotografía profesional del sector, sujeto principal, composición rule of thirds, COPY SPACE explícito (zona donde NO haya elementos importantes para que quepa texto), iluminación cinematográfica, paleta de colores exacta, calidad editorial. NUNCA pidas texto, logos, watermarks. Máximo 200 palabras. Inspírate en: ${biblio.moodPrompt}",
  "tituloPrincipal": "TÍTULO IMPACTANTE DEL CURSO EN MAYÚSCULAS (puede ser idéntico al nombre o más conciso)",
  "subtitulo": "Frase corta evocativa máximo 8 palabras",
  "categoriaSello": "PALABRA CORTA tipo etiqueta (ej: ${biblio.nombre.toUpperCase()})",
  "sellos": [
    { "texto": "SELLO 1", "color": "#hex", "esquina": "topRight|topLeft|bottomLeft|bottomRight" }
  ],
  "bullets": ["3-5 bullets de máximo 4 palabras cada uno"],
  "paleta": {
    "fondo": "#hex (color dominante de overlay)",
    "tituloColor": "#hex (alto contraste con fondo)",
    "acentoBrand": "#hex (color de la consultora)",
    "selloUrgencia": "#hex (rojo energético)",
    "selloCalidad": "#hex (dorado o color premium)"
  },
  "layoutZone": {
    "tituloPosicion": "bottom|center|topLeft (dónde poner el título)",
    "imagenZonaSujeto": "left|right|center (dónde estará el sujeto en la imagen)",
    "overlayDireccion": "bottom|top|left|right (de dónde viene el gradiente oscuro)"
  },
  "tonoDiseno": "premium|editorial|institucional|comercial|luxury"
}`;

    const userPrompt = `CONSULTORA: ${consultora.nombre} (${consultora.rubro})
Colores marca: ${consultora.colorPrincipal}, ${consultora.colorSecundario}
Estilo de la consultora: ${consultora.estiloVisual}

CURSO: ${curso.nombre}
DESCRIPCIÓN BREVE: ${curso.descripcionBreve || '(sin descripción)'}
PONENTE: ${curso.ponente || '(no especificado)'}
MODALIDAD: ${curso.modalidad}
TIPO DE PUBLICACIÓN: ${curso.tipoPublicacion}
PRECIO: ${curso.precio || 'no especificado'}
DURACIÓN: ${curso.duracion || 'no especificada'}

DETALLES DE CÓMO LO QUIERO (PRIORIDAD MÁXIMA — RESPÉTALO):
${curso.detallesIA || 'Sin detalles. Diseña con tu mejor criterio profesional para el sector.'}

Genera el JSON completo. Recuerda: este flyer debe verse como ${biblio.referencias.split(',')[0]}, no como un template genérico.`;

    const content = await this._chat(
      [{ role: 'system', content: systemPrompt }, { role: 'user', content: userPrompt }],
      { json: true, temperature: 0.9, max_tokens: 1800 }
    );
    const composicion = JSON.parse(content);
    composicion.sector = sector;
    composicion.biblioteca = biblio.nombre;
    return composicion;
  },

  // AGENTE 4: Generador de imagen con DALL-E 3 HD
  async generateImageHD(prompt) {
    const key = this.getKey();
    if (!key) throw new Error('Falta API key de OpenAI');

    const finalPrompt = prompt + ' Ultra high quality professional editorial photography, cinematic lighting, sharp focus, magazine-grade composition. Strictly NO text, NO logos, NO watermarks, NO writing of any kind on the image.';

    const res = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: 'dall-e-3',
        prompt: finalPrompt,
        n: 1,
        size: '1024x1024',
        quality: 'hd',
        style: 'natural',
        response_format: 'b64_json'
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error('DALL-E error: ' + (err.error?.message || res.statusText));
    }
    const data = await res.json();
    return 'data:image/png;base64,' + data.data[0].b64_json;
  },

  // AGENTE 5: Vision Validator - analiza la imagen generada
  async analyzeImageWithVision(imageBase64, composicion) {
    const systemPrompt = `Eres un experto en composición visual. Analizas una imagen generada y devuelves coordenadas exactas para colocar texto sin obstruir elementos importantes.`;

    const userPrompt = `Analiza esta imagen de 1024x1024 px que será usada como fondo de un flyer. El título principal será: "${composicion.tituloPrincipal}". El layout zone esperado tiene el título en: ${composicion.layoutZone?.tituloPosicion || 'bottom'}.

Devuelve SOLO este JSON (sin markdown):
{
  "imagenUsable": true|false,
  "razonRechazo": "texto si imagenUsable es false",
  "sujetoPrincipal": { "x": 0-1024, "y": 0-1024, "ancho": 0-1024, "alto": 0-1024 },
  "zonaLibreParaTexto": { "x": 0-1024, "y": 0-1024, "ancho": 0-1024, "alto": 0-1024, "descripcion": "ej: parte inferior con cielo desenfocado" },
  "luminosidad": {
    "arriba": "claro|medio|oscuro",
    "centro": "claro|medio|oscuro",
    "abajo": "claro|medio|oscuro",
    "izquierda": "claro|medio|oscuro",
    "derecha": "claro|medio|oscuro"
  },
  "colorTextoRecomendado": {
    "arriba": "#hex",
    "centro": "#hex",
    "abajo": "#hex"
  },
  "necesitaOverlayOscuro": true|false,
  "mejorEsquinaParaSelloUrgencia": "topRight|topLeft|bottomRight|bottomLeft",
  "mejorEsquinaParaSelloCalidad": "topRight|topLeft|bottomRight|bottomLeft"
}`;

    const key = this.getKey();
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: 'gpt-4o',
        messages: [
          { role: 'system', content: systemPrompt },
          {
            role: 'user',
            content: [
              { type: 'text', text: userPrompt },
              { type: 'image_url', image_url: { url: imageBase64, detail: 'low' } }
            ]
          }
        ],
        temperature: 0.3,
        response_format: { type: 'json_object' },
        max_tokens: 800
      })
    });
    if (!res.ok) {
      console.warn('Vision falló, usando defaults');
      return { imagenUsable: true, luminosidad: { abajo: 'oscuro', arriba: 'medio' }, necesitaOverlayOscuro: true };
    }
    const data = await res.json();
    return JSON.parse(data.choices[0].message.content);
  },

  // Pipeline maestro: ejecuta los 5 agentes en orden
  async generateMasterFlyer(curso, consultora, onProgress) {
    onProgress && onProgress('🎓 Curador identificando sector...', 5);
    const sector = detectarSector(curso.nombre, curso.descripcionBreve);

    onProgress && onProgress('🎨 Director de arte componiendo concepto creativo...', 15);
    const composicion = await this.composeFlyer(curso, consultora);

    onProgress && onProgress('✨ DALL-E 3 HD generando imagen sectorial premium...', 40);
    const imagenIA = await this.generateImageHD(composicion.imagePrompt);

    onProgress && onProgress('🔍 GPT-4 Vision analizando composición de la imagen...', 80);
    let analisisVisual;
    try {
      analisisVisual = await this.analyzeImageWithVision(imagenIA, composicion);
    } catch (e) {
      analisisVisual = { imagenUsable: true, necesitaOverlayOscuro: true };
    }

    onProgress && onProgress('🎯 Ensamblando flyer con precisión milimétrica...', 95);
    return { composicion, imagenIA, analisisVisual, sector };
  },

  async testKey(key) {
    const res = await fetch('https://api.openai.com/v1/models', {
      headers: { 'Authorization': 'Bearer ' + key }
    });
    return res.ok;
  }
};

const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

function AppProvider({ children }) {
  const [consultoras, setConsultoras] = useState(() => {
    let stored = Storage.get('consultoras', CONSULTORAS_DEFAULT);
    // Migración: reemplazar ICADEM Business → IMDAC si existe
    const idx = stored.findIndex(c => c.id === 'icademb' || c.nombre === 'ICADEM Business');
    if (idx >= 0) {
      stored = [...stored];
      stored[idx] = { ...stored[idx], id: 'imdac', nombre: 'IMDAC', rubro: 'Capacitación profesional' };
    }
    return stored;
  });
  const [cursos, setCursos] = useState(() => Storage.get('cursos', []));
  const [historial, setHistorial] = useState(() => Storage.get('historial', []));
  const [plantillas, setPlantillas] = useState(() => Storage.get('plantillas', []));
  const [route, setRoute] = useState({ name: 'dashboard' });

  useEffect(() => Storage.set('consultoras', consultoras), [consultoras]);
  useEffect(() => Storage.set('cursos', cursos), [cursos]);
  useEffect(() => Storage.set('historial', historial), [historial]);
  useEffect(() => Storage.set('plantillas', plantillas), [plantillas]);

  const value = {
    consultoras, setConsultoras,
    cursos, setCursos,
    historial, setHistorial,
    plantillas, setPlantillas,
    route, setRoute,
    navigate: (name, params = {}) => setRoute({ name, ...params }),
  };

  return <AppCtx.Provider value={value}>{children}</AppCtx.Provider>;
}

function ApiKeyModal({ onClose, onSaved }) {
  const [key, setKey] = useState(OpenAI.getKey());
  const [testing, setTesting] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState(false);

  const save = async () => {
    if (!key.trim().startsWith('sk-')) {
      setError('La API key debe empezar con "sk-"');
      return;
    }
    setTesting(true); setError(''); setSuccess(false);
    try {
      const ok = await OpenAI.testKey(key.trim());
      if (!ok) { setError('La API key no es válida o no tiene saldo'); setTesting(false); return; }
      OpenAI.setKey(key.trim());
      setSuccess(true);
      setTimeout(() => onSaved(), 800);
    } catch (e) {
      setError('Error al validar: ' + e.message);
    }
    setTesting(false);
  };

  const remove = () => {
    if (confirm('¿Desconectar la API key? Volverás a modo demo.')) {
      OpenAI.removeKey();
      onSaved();
    }
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.75)', backdropFilter: 'blur(8px)' }}>
      <div className="glass-strong rounded-3xl max-w-lg w-full p-7 border border-cyan-400/30">
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-xl font-bold gradient-text">⚡ Conectar OpenAI</h3>
          <button onClick={onClose} className="w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center">✕</button>
        </div>

        <p className="text-sm text-blue-200/80 mb-4 leading-relaxed">
          Pega tu API key de OpenAI para activar generación real con GPT-4 y DALL-E 3. Tu key se guarda solo en tu navegador, nunca se envía a otro servidor.
        </p>

        <label className="block text-xs uppercase tracking-wider text-blue-300/70 mb-1.5 font-semibold">API Key</label>
        <input
          type="password"
          value={key}
          onChange={e => setKey(e.target.value)}
          placeholder="sk-proj-..."
          className="w-full px-4 py-3 rounded-xl text-sm font-mono"
          autoFocus
        />

        {error && <div className="mt-3 p-3 rounded-lg bg-red-500/15 border border-red-400/30 text-red-200 text-xs">{error}</div>}
        {success && <div className="mt-3 p-3 rounded-lg bg-emerald-500/15 border border-emerald-400/30 text-emerald-200 text-xs">✓ API key válida. Activando IA real...</div>}

        <div className="mt-5 p-4 rounded-xl bg-blue-500/10 border border-blue-400/20 text-xs text-blue-100/80 leading-relaxed">
          <div className="font-semibold text-blue-200 mb-1">¿Dónde la consigo?</div>
          1. Ve a <span className="font-mono text-cyan-300">platform.openai.com/api-keys</span><br/>
          2. Clic en "Create new secret key"<br/>
          3. Cópiala y pégala aquí<br/>
          4. Asegúrate de tener saldo en Billing (mínimo $5 USD)
        </div>

        <div className="flex gap-2 mt-5">
          {OpenAI.getKey() && (
            <button onClick={remove} className="px-4 py-3 rounded-xl glass text-xs hover:bg-red-500/10 text-red-300 border border-red-400/20">
              Desconectar
            </button>
          )}
          <button onClick={onClose} className="flex-1 px-4 py-3 rounded-xl glass text-sm hover:bg-white/10">Cancelar</button>
          <button onClick={save} disabled={testing || !key.trim()} className="flex-1 btn-primary py-3 rounded-xl text-sm font-bold text-white disabled:opacity-50">
            {testing ? 'Validando...' : 'Conectar y guardar'}
          </button>
        </div>
      </div>
    </div>
  );
}

  useEffect(() => {
    if (form.nombre.length > 4) setAnalisis(analyzeCourseTitle(form.nombre));
    else setAnalisis(null);

let layerCounter = 0;
function nextLayerId() { return 'L' + (++layerCounter); }

function construirFlyerBase(canvas, curso, consultora) {
  const W = 1080, H = 1080;
  const comp = curso.composicionIA;
  const c1 = (comp && comp.paletaSugerida && comp.paletaSugerida.principal) || consultora.colorPrincipal;
  const c2 = (comp && comp.paletaSugerida && comp.paletaSugerida.secundario) || consultora.colorSecundario;
  const acento = (comp && comp.paletaSugerida && comp.paletaSugerida.acento) || '#ffffff';
  const ana = curso.analisis;

  // FONDO: imagen real de DALL-E si existe, gradiente si no
  if (curso.imagenIA) {
    fabric.Image.fromURL(curso.imagenIA, img => {
      const scale = Math.max(W / img.width, H / img.height);
      img.set({
        left: 0, top: 0, originX: 'left', originY: 'top',
        scaleX: scale, scaleY: scale, selectable: false, evented: false
      });
      img.layerId = nextLayerId(); img.layerName = 'imagenFondoIA';
      canvas.insertAt(img, 0);
      canvas.requestRenderAll();
    }, { crossOrigin: 'anonymous' });
  } else {
    const bg = new fabric.Rect({
      left: 0, top: 0, width: W, height: H,
      fill: new fabric.Gradient({
        type: 'linear', coords: { x1: 0, y1: 0, x2: W, y2: H },
        colorStops: [{ offset: 0, color: c1 }, { offset: 1, color: c2 }]
      }),
      selectable: false, evented: false
    });
    bg.layerId = nextLayerId(); bg.layerName = 'background';
    canvas.add(bg);
  }

  // Overlay oscuro (más fuerte si hay imagen real para legibilidad)
  const overlayOpacity = curso.imagenIA ? 0.85 : 0.75;
  const overlay = new fabric.Rect({
    left: 0, top: H * (curso.imagenIA ? 0.4 : 0.55), width: W, height: H * (curso.imagenIA ? 0.6 : 0.45),
    fill: new fabric.Gradient({
      type: 'linear', coords: { x1: 0, y1: 0, x2: 0, y2: H * 0.6 },
      colorStops: [{ offset: 0, color: 'rgba(0,0,0,0)' }, { offset: 1, color: 'rgba(0,0,0,' + overlayOpacity + ')' }]
    }),
    selectable: false, evented: false
  });
  overlay.layerId = nextLayerId(); overlay.layerName = 'overlay';
  canvas.add(overlay);

  // Decoración solo si NO hay imagen IA
  if (!curso.imagenIA) {
    const deco = new fabric.Circle({
      left: W - 200, top: -150, radius: 280,
      fill: 'rgba(255,255,255,0.08)', stroke: 'rgba(255,255,255,0.2)', strokeWidth: 2
    });
    deco.layerId = nextLayerId(); deco.layerName = 'decorativeShape';
    canvas.add(deco);
  }

  // Badge tipo de publicación / categoría IA
  const badgeLabel = (comp && comp.categoriaSello) || (curso.tipoPublicacion || 'CURSO');
  const badgeBg = new fabric.Rect({
    left: 60, top: 60, width: 240, height: 50, rx: 25, ry: 25,
    fill: 'rgba(255,255,255,0.95)'
  });
  badgeBg.layerId = nextLayerId(); badgeBg.layerName = 'badgeBg';
  canvas.add(badgeBg);

  const badgeText = new fabric.IText(badgeLabel.toUpperCase(), {
    left: 180, top: 85, fontSize: 16, fontWeight: 'bold', fill: c1,
    fontFamily: 'Inter, sans-serif', originX: 'center', originY: 'center', textAlign: 'center', charSpacing: 100
  });
  badgeText.layerId = nextLayerId(); badgeText.layerName = 'badgeText';
  canvas.add(badgeText);

  const consText = new fabric.IText(consultora.nombre.toUpperCase(), {
    left: W - 60, top: 85, fontSize: 22, fontWeight: 'bold', fill: '#ffffff',
    fontFamily: 'Inter, sans-serif', originX: 'right', originY: 'center', opacity: 0.9
  });
  consText.layerId = nextLayerId(); consText.layerName = 'consultoraText';
  canvas.add(consText);

  // Sellos generados por GPT-4 (EN VIVO, CUPO LIMITADO, etc.)
  if (comp && comp.sellos && comp.sellos.length) {
    comp.sellos.forEach((sello, i) => {
      const positions = {
        topRight: { left: W - 60, top: 160, originX: 'right', originY: 'top' },
        topLeft: { left: 60, top: 160, originX: 'left', originY: 'top' },
        bottomLeft: { left: 60, top: H - 60, originX: 'left', originY: 'bottom' },
        bottomRight: { left: W - 60, top: H - 60, originX: 'right', originY: 'bottom' }
      };
      const pos = positions[sello.esquina] || positions.topRight;
      const selloText = new fabric.IText(sello.texto.toUpperCase(), {
        ...pos, fontSize: 22, fontWeight: '900', fill: '#ffffff',
        fontFamily: 'Inter, sans-serif',
        backgroundColor: sello.color || '#dc2626', padding: 14, charSpacing: 100
      });
      selloText.set({ left: pos.left, top: pos.top + (i * 70) });
      selloText.layerId = nextLayerId(); selloText.layerName = 'sello_' + i;
      canvas.add(selloText);
    });
  }

  // Subtítulo / categoría IA
  const subtituloText = (comp && comp.subtitulo) || (ana && ana.categoria);
  if (subtituloText) {
    const sub = new fabric.IText(subtituloText.toUpperCase(), {
      left: 60, top: 340, fontSize: 22, fontWeight: 'bold', fill: c2,
      fontFamily: 'Inter, sans-serif', charSpacing: 200
    });
    sub.layerId = nextLayerId(); sub.layerName = 'subtitleText';
    canvas.add(sub);
  }

  const tituloFinal = (comp && comp.tituloPrincipal) || curso.nombre;
  const titulo = new fabric.IText(tituloFinal.toUpperCase(), {
    left: 60, top: 380, fontSize: 68, fontWeight: '900', fill: '#ffffff',

  // Bullets generados por GPT-4

    });

  let chipY = 720;
  const chipsArr = [
    curso.fechaInicio && '📅 ' + curso.fechaInicio,
    curso.modalidad && '💻 ' + curso.modalidad,

  let chipX = 60;
  chipsArr.forEach((label, i) => {

      left: chipX, top: chipY, fontSize: 22, fill: '#ffffff', fontFamily: 'Inter, sans-serif',
      backgroundColor: 'rgba(255,255,255,0.15)', padding: 12
    });
    t.layerId = nextLayerId(); t.layerName = 'chip_' + i;
    canvas.add(t);
    chipX += t.width + 30;
  });

  if (curso.precio) {
    const precio = new fabric.IText(curso.precio, {
      left: W - 60, top: 800, fontSize: 60, fontWeight: '900', fill: c2,
      fontFamily: 'Inter, sans-serif', originX: 'right',
      shadow: 'rgba(0,0,0,0.5) 0 4 12'
    });
    precio.layerId = nextLayerId(); precio.layerName = 'priceText';
    canvas.add(precio);
  }

  const ctaBg = new fabric.Rect({
    left: 60, top: 900, width: 380, height: 80, rx: 40, ry: 40,
    fill: '#ffffff'
  });
  ctaBg.layerId = nextLayerId(); ctaBg.layerName = 'ctaBg';
  canvas.add(ctaBg);

  const ctaText = new fabric.IText(curso.cta || 'INSCRÍBETE HOY', {
    left: 250, top: 940, fontSize: 26, fontWeight: '900', fill: c1,
    fontFamily: 'Inter, sans-serif', originX: 'center', originY: 'center', charSpacing: 100
  });
  ctaText.layerId = nextLayerId(); ctaText.layerName = 'ctaText';
  canvas.add(ctaText);

  const footerStr = [curso.telefono, curso.web].filter(Boolean).join('   ·   ');
  if (footerStr) {
    const footer = new fabric.IText(footerStr, {
      left: W - 60, top: 940, fontSize: 20, fill: '#ffffff',
      fontFamily: 'Inter, sans-serif', originX: 'right', originY: 'center', opacity: 0.85
    });
    footer.layerId = nextLayerId(); footer.layerName = 'footerContact';
    canvas.add(footer);
  }

  if (curso.ponente) {
    const pon = new fabric.IText('PONENTE: ' + curso.ponente, {
      left: 60, top: 820, fontSize: 18, fontWeight: 'bold', fill: '#ffffff',
      fontFamily: 'Inter, sans-serif', opacity: 0.85, charSpacing: 100
    });
    pon.layerId = nextLayerId(); pon.layerName = 'ponenteText';
    canvas.add(pon);
  }

  canvas.requestRenderAll();
}

function addText(canvas) {
  if (!canvas) return;
  const t = new fabric.IText('Nuevo texto', {
    left: 540, top: 540, fontSize: 48, fill: '#ffffff', fontFamily: 'Inter, sans-serif',
    originX: 'center', originY: 'center'
  });
  t.layerId = nextLayerId(); t.layerName = 'newText';
  canvas.add(t);
  canvas.setActiveObject(t);
  canvas.requestRenderAll();
}

function addImage(e, canvas, refresh) {
  const file = e.target.files[0]; if (!file || !canvas) return;
  const reader = new FileReader();
  reader.onload = ev => {
    fabric.Image.fromURL(ev.target.result, img => {
      img.scaleToWidth(400);
      img.set({ left: 540, top: 540, originX: 'center', originY: 'center' });
      img.layerId = nextLayerId(); img.layerName = 'newImage';
      canvas.add(img);
      canvas.setActiveObject(img);
      canvas.requestRenderAll();
      refresh && refresh();
    });
  };
  reader.readAsDataURL(file);
}

function FlyerEditor() {
  const { route, navigate, consultoras, cursos, historial, setHistorial } = useApp();
  const consultora = consultoras.find(c => c.id === route.consultoraId);
  const curso = cursos.find(c => c.id === route.cursoId);
  const canvasRef = useRef(null);
  const fabricRef = useRef(null);
  const [layers, setLayers] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [props, setProps] = useState({});

  useEffect(() => {
    if (!canvasRef.current || !curso || !consultora) return;
    const canvas = new fabric.Canvas(canvasRef.current, { width: 1080, height: 1080, backgroundColor: '#0a1538' });
    fabricRef.current = canvas;

    construirFlyerBase(canvas, curso, consultora);
    refreshLayers();

    canvas.on('selection:created', e => onSelect(e.selected[0]));
    canvas.on('selection:updated', e => onSelect(e.selected[0]));
    canvas.on('selection:cleared', () => { setSelectedId(null); setProps({}); });
    canvas.on('object:modified', refreshLayers);

    return () => canvas.dispose();
  }, []);

  function refreshLayers() {
    if (!fabricRef.current) return;
    const objs = fabricRef.current.getObjects();
    setLayers(objs.map(o => ({ id: o.layerId, name: o.layerName, type: o.type, obj: o })));
  }

  function onSelect(obj) {
    setSelectedId(obj.layerId);
    setProps({
      text: obj.text !== undefined ? obj.text : '',
      fontSize: obj.fontSize || 0,
      fill: typeof obj.fill === 'string' ? obj.fill : '#ffffff',
      fontWeight: obj.fontWeight || 'normal',
      opacity: obj.opacity !== undefined ? obj.opacity : 1,
    });
  }

  function updateSelected(key, val) {
    const obj = fabricRef.current.getActiveObject(); if (!obj) return;
    obj.set(key, val);
    fabricRef.current.requestRenderAll();
    setProps(p => ({ ...p, [key]: val }));
  }

  function selectLayer(layer) {
    fabricRef.current.setActiveObject(layer.obj);
    fabricRef.current.requestRenderAll();
    onSelect(layer.obj);
  }

  function deleteLayer(layer) {
    fabricRef.current.remove(layer.obj);
    fabricRef.current.requestRenderAll();
    refreshLayers();
  }

  function moveLayer(layer, dir) {
    if (dir === 'up') layer.obj.bringForward(); else layer.obj.sendBackwards();
    fabricRef.current.requestRenderAll();
    refreshLayers();
  }

  function exportPNG(size) {
    const canvas = fabricRef.current;
    const multiplier = size / 1080;
    const dataURL = canvas.toDataURL({ format: 'png', multiplier });
    const link = document.createElement('a');
    link.download = (curso.nombre || 'flyer').toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') + '-' + size + '.png';
    link.href = dataURL;
    link.click();
    setHistorial([...historial, {
      id: 'h_' + Date.now(),
      curso: curso.nombre,
      consultora: consultora.nombre,
      size,
      fecha: Date.now(),
      preview: canvas.toDataURL({ format: 'png', multiplier: 0.25 })
    }]);
  }

  if (!curso || !consultora) {
    return <div className="p-8 text-blue-200">Curso no encontrado. <button onClick={() => navigate('dashboard')} className="text-cyan-300 underline">Volver</button></div>;
  }

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <Topbar
        titulo="Editor de Flyer"
        subtitulo={consultora.nombre + ' · ' + curso.nombre}
        right={
          <div className="flex gap-2">
            <button onClick={() => navigate('workspace', { consultoraId: consultora.id })} className="px-4 py-2 rounded-xl glass text-sm hover:bg-white/10">← Volver</button>
            <button onClick={() => exportPNG(1080)} className="px-4 py-2 rounded-xl glass text-sm hover:bg-white/10 border border-cyan-400/30">PNG 1080</button>
            <button onClick={() => exportPNG(2048)} className="btn-primary px-4 py-2 rounded-xl text-sm font-semibold text-white">⬇ PNG 2048</button>
          </div>
        }
      />

      <div className="flex-1 grid grid-cols-12 gap-4 p-4 overflow-hidden">
        <div className="col-span-3 glass rounded-2xl p-4 flex flex-col overflow-hidden">
          <div className="text-sm font-bold mb-3 flex items-center gap-2">
            <span className="w-1 h-4 rounded-full bg-cyan-400"></span>
            Capas
          </div>
          <div className="flex-1 overflow-auto scrollbar-thin space-y-1.5">
            {[...layers].reverse().map(l => (
              <div
                key={l.id}
                className={'layer-row flex items-center gap-2 p-2.5 rounded-lg border border-white/10 cursor-pointer hover:bg-white/5 ' + (selectedId === l.id ? 'selected' : '')}
                onClick={() => selectLayer(l)}
              >
                <span className="text-xs text-blue-300/70">{l.type === 'i-text' ? '✎' : l.type === 'image' ? '◰' : '◇'}</span>
                <span className="text-xs flex-1 truncate">{l.name}</span>
                <button onClick={e => { e.stopPropagation(); moveLayer(l, 'up'); }} className="text-xs text-blue-200/60 hover:text-white px-1">↑</button>
                <button onClick={e => { e.stopPropagation(); moveLayer(l, 'down'); }} className="text-xs text-blue-200/60 hover:text-white px-1">↓</button>
                <button onClick={e => { e.stopPropagation(); deleteLayer(l); }} className="text-xs text-red-300/70 hover:text-red-300 px-1">×</button>

          {selectedId ? (

              <div>
                <label className="text-xs uppercase tracking-wider text-blue-300/70 font-semibold">Color</label>

function GeneradorMasivo() {
  const { consultoras, navigate, setCursos, cursos, setHistorial, historial } = useApp();

  const [precio, setPrecio] = useState('');
  const [modalidad, setModalidad] = useState('Online');
  const [duracion, setDuracion] = useState('');
  const [ponente, setPonente] = useState('');

  const [procesando, setProcesando] = useState(false);
  const [resultados, setResultados] = useState([]);
  const [actual, setActual] = useState(0);
  const [total, setTotal] = useState(0);
  const [progresoActual, setProgresoActual] = useState(0);
  const [mensajeActual, setMensajeActual] = useState('');

  const consultora = consultoras.find(c => c.id === consultoraId);
  const cursosArr = listaCursos.split('\n').map(s => s.trim()).filter(Boolean);

  const generar = async () => {
    if (!OpenAI.getKey()) {
      alert('Conecta tu API key de OpenAI primero (clic en el indicador del sidebar abajo)');
      return;
    }
    if (cursosArr.length === 0) {
      alert('Pega al menos un nombre de curso');
      return;
    }
    if (cursosArr.length > 10) {
      alert('Máximo 10 flyers por lote para evitar gastos altos');
      return;
    }
    if (!consultora) { alert('Selecciona una consultora'); return; }

    if (!confirm(`Vas a generar ${cursosArr.length} flyers en alta calidad.\nCosto aproximado: $${(cursosArr.length * 0.14).toFixed(2)} USD ≈ $${(cursosArr.length * 2.8).toFixed(0)} MXN.\n\n¿Continuar?`)) return;

    setProcesando(true);
    setResultados([]);
    setTotal(cursosArr.length);
    const out = [];

    for (let i = 0; i < cursosArr.length; i++) {
      setActual(i + 1);
      const nombreCurso = cursosArr[i];
      const cursoBase = {
        id: 'c_' + Date.now() + '_' + i,

                <div className="flex items-center gap-3 mb-2">
                  <div className="w-8 h-8 rounded-full border-2 border-cyan-400/30 border-t-cyan-400 animate-spin"></div>
                  <div className="flex-1">
                    <div className="text-sm font-semibold text-cyan-200">Procesando flyer {actual} de {total}</div>
                    <div className="text-xs text-blue-200/70 truncate">{cursosArr[actual - 1]}</div>
                  </div>
                </div>
                <div className="text-[11px] text-blue-200/70 mb-2">{mensajeActual}</div>
                <div className="w-full h-1.5 rounded-full bg-white/10 overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-cyan-400 to-blue-500 transition-all" style={{ width: progresoActual + '%' }}></div>
                </div>
              </div>
            )}

            {resultados.length === 0 && !procesando && (
              <div className="text-center py-8 text-blue-200/50 text-sm">
                <div className="text-4xl mb-2 opacity-50">📦</div>
                Los flyers generados aparecerán aquí
              </div>
            )}

            <div className="space-y-2 max-h-[600px] overflow-auto scrollbar-thin">
              {resultados.map((r, i) => (
                <div key={i} className={'p-3 rounded-xl border ' + (r.ok ? 'border-emerald-400/30 bg-emerald-500/5' : 'border-red-400/30 bg-red-500/5')}>
                  <div className="flex items-start gap-3">
                    {r.ok && r.curso.imagenIA ? (
                      <img src={r.curso.imagenIA} alt="" className="w-16 h-16 rounded-lg object-cover" />
                    ) : (
                      <div className={'w-16 h-16 rounded-lg flex items-center justify-center text-2xl ' + (r.ok ? 'bg-emerald-500/20' : 'bg-red-500/20')}>
                        {r.ok ? '✓' : '✕'}
                      </div>
                    )}
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-semibold truncate">{r.curso.nombre}</div>
                      {r.ok ? (
                        <>
                          <div className="text-[11px] text-blue-200/60">{r.curso.composicionIA?.biblioteca || 'Generado'} · Sector: {r.curso.sectorDetectado}</div>
                          <button onClick={() => verEnEditor(r.curso.id)} className="text-[11px] text-cyan-300 hover:text-cyan-200 font-semibold mt-1">Abrir en editor →</button>
                        </>
                      ) : (
                        <div className="text-[11px] text-red-300">{r.error}</div>
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Plantillas() {
  return (
    <div className="flex-1 overflow-auto scrollbar-thin">
      <Topbar titulo="Plantillas" subtitulo="Guarda diseños como plantillas reutilizables" />
      <div className="p-8">
        <div className="glass rounded-2xl p-12 text-center">
          <div className="text-5xl mb-4 opacity-50">◫</div>
          <p className="text-blue-200/70">Aún no hay plantillas guardadas. En la siguiente fase podrás guardar diseños del editor como plantillas reutilizables.</p>
        </div>
      </div>
    </div>
  );
}

function Historial() {
  const { historial, navigate } = useApp();
  return (
    <div className="flex-1 overflow-auto scrollbar-thin">
      <Topbar titulo="Historial de diseños" subtitulo={historial.length + ' diseños generados'} />
      <div className="p-8">
        {historial.length === 0 ? (
          <div className="glass rounded-2xl p-12 text-center">
            <div className="text-5xl mb-4 opacity-50">⟲</div>
            <p className="text-blue-200/70">Tu historial está vacío. Empieza generando un flyer.</p>
            <button onClick={() => navigate('dashboard')} className="mt-4 btn-primary px-5 py-2.5 rounded-xl text-sm font-semibold text-white">Ir al Dashboard</button>
          </div>
        ) : (
          <div className="grid grid-cols-4 gap-4">
            {historial.slice().reverse().map(h => (
              <div key={h.id} className="glass rounded-2xl overflow-hidden card-hover">
                {h.preview && <img src={h.preview} alt="" className="w-full aspect-square object-cover" />}
                <div className="p-3">
                  <div className="text-sm font-semibold truncate">{h.curso}</div>
                  <div className="text-xs text-blue-200/60">{h.consultora}</div>
                  <div className="text-[10px] text-blue-200/50 mt-1">{new Date(h.fecha).toLocaleString('es-MX')} · {h.size}px</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function AdminConsultoras() {
  const { consultoras, setConsultoras } = useApp();

  const toggle = id => setConsultoras(consultoras.map(c => c.id === id ? { ...c, activa: !c.activa } : c));
  const updateField = (id, key, val) => setConsultoras(consultoras.map(c => c.id === id ? { ...c, [key]: val } : c));

  const uploadAvatar = (id, e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => updateField(id, 'avatar', ev.target.result);
    reader.readAsDataURL(file);
  };

  return (
    <div className="flex-1 overflow-auto scrollbar-thin">
      <Topbar titulo="Administrar Consultoras" subtitulo="Edita avatares, colores y estado activo" />
      <div className="p-8 space-y-3">
        {consultoras.map(c => (
          <div key={c.id} className="glass rounded-2xl p-5 flex items-center gap-5">
            <Avatar consultora={c} size="lg" />
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-3">
                <input value={c.nombre} onChange={e => updateField(c.id, 'nombre', e.target.value)} className="text-base font-bold bg-transparent border-0 outline-none flex-1 max-w-xs" style={{ background: 'transparent !important', border: '0 !important' }} />
                <span className={'text-[10px] px-2 py-0.5 rounded-full font-bold ' + (c.activa ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-400/30' : 'bg-gray-500/20 text-gray-400 border border-gray-400/30')}>
                  {c.activa ? 'ACTIVA' : 'INACTIVA'}
                </span>
              </div>
              <input value={c.rubro} onChange={e => updateField(c.id, 'rubro', e.target.value)} className="text-xs text-blue-200/70 bg-transparent border-0 outline-none w-full mt-1" />
            </div>
            <div className="flex gap-2">
              <input type="color" value={c.colorPrincipal} onChange={e => updateField(c.id, 'colorPrincipal', e.target.value)} className="w-10 h-10 rounded-lg cursor-pointer" />
              <input type="color" value={c.colorSecundario} onChange={e => updateField(c.id, 'colorSecundario', e.target.value)} className="w-10 h-10 rounded-lg cursor-pointer" />
            </div>
            <label className="px-3 py-2 rounded-lg glass text-xs cursor-pointer hover:bg-white/10">
              📷 Avatar
              <input type="file" accept="image/*" className="hidden" onChange={e => uploadAvatar(c.id, e)} />
            </label>
            <button
              onClick={() => toggle(c.id)}
              className={'px-4 py-2 rounded-lg text-xs font-semibold ' + (c.activa ? 'glass hover:bg-white/10' : 'btn-primary text-white')}
            >
              {c.activa ? 'Desactivar' : 'Activar'}
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

function CierreCurso() {
  return (
    <div className="flex-1 overflow-auto scrollbar-thin">
      <Topbar titulo="Publicación de cierre" subtitulo="Sube la captura grupal y genera el agradecimiento" />
      <div className="p-8">
        <div className="glass rounded-2xl p-12 text-center max-w-2xl mx-auto">
          <div className="text-5xl mb-4 opacity-60">◎</div>
          <h3 className="text-xl font-bold mb-2 gradient-text">Próxima fase</h3>
          <p className="text-blue-200/70 leading-relaxed">El módulo de cierre permitirá subir la foto grupal del curso y generar un diseño con mensaje de agradecimiento, fondo temático según el rubro de la consultora y exportación en PNG. La estructura del MVP ya está lista para implementarlo.</p>
        </div>
      </div>
    </div>
  );
}

function Router() {
  const { route } = useApp();
  return (
    <div className="flex h-screen w-screen overflow-hidden">
      <Sidebar />
      {route.name === 'dashboard' && <Dashboard />}
      {route.name === 'workspace' && <ConsultoraWorkspace />}
      {route.name === 'editor' && <FlyerEditor />}
      {route.name === 'masivo' && <GeneradorMasivo />}
      {route.name === 'plantillas' && <Plantillas />}
      {route.name === 'historial' && <Historial />}
      {route.name === 'admin' && <AdminConsultoras />}
      {route.name === 'cierre' && <CierreCurso />}
    </div>
  );
}

function App() {
  return (
    <AppProvider>
      <Router />
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
